name: Build -> Test

on:
  push:
    branches-ignore:
      - main
      - next
      - alpha
      - beta
      - '*.x*'
  pull_request:
    branches:
      - main
      - next
      - alpha
      - beta
      - '*.x*'

jobs:
  test:
    name: Test -> Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup LTS Node
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install

      - name: Build packages
        run: yarn build:packages

      - name: Test
        run: yarn test:all
